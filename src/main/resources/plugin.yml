name: BuildingUnit
main: org.etwxr9.buildingunit.BuildingUnitMain
version: ${project.version}
api-version: '1.21'
description: Persistent schematic placement and indexed unit lookup service for Paper.
author: etwxr9
website: https://github.com/etwxr9
depend: [FastAsyncWorldEdit]

permissions:
  buildingunit.admin:
    description: Access to BuildingUnit management commands.
    default: op

commands:
  bu:
    description: BuildingUnit management command
    usage: /bu <save|paste|preview|delete|info|reload|stats>
    permission: buildingunit.admin
